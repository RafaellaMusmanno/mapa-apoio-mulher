# =============================================
# application.properties – Mapa Apoio à Mulher
# =============================================

# Banco de Dados
spring.datasource.url=jdbc:mysql://localhost:3306/mapa_apoio_mulher?useSSL=false&serverTimezone=America/Sao_Paulo&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=sua_senha_aqui
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Servidor
server.port=8080

# CORS (libera acesso do frontend React)
spring.web.cors.allowed-origins=http://localhost:3000
